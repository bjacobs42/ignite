[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# 17:00 UTC = 19:00 CEST / 18:00 CET — snapshots E2 before the activation run
[functions."refresh-count"]
  schedule = "0 17 * * *"
  timeout  = 30

# 18:00 UTC = 20:00 CEST / 19:00 CET — runs 1h after refresh-count
[functions."sync-products"]
  schedule = "0 18 * * *"
  timeout  = 60

[functions."test-sync"]
  timeout = 30
